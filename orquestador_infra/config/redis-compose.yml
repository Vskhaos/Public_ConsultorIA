version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save "" --appendonly no
    networks:
      - ai_pentest_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  redis_data:

networks:
  ai_pentest_net:
    external: true
