version: "3.8"

# MinIO local en orchestrator. Sustituye al MinIO de isard (10.20.30.40:9000)
# que se apaga al desmantelar isard. Mismo patrón que ai_memory (pgvector):
# overlay del swarm local 1-nodo, puerto host-bind, volumen persistente.
#
# Buckets esperados: audit-files (informes técnicos/ejecutivos + wg_configs)

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_local
      MINIO_ROOT_PASSWORD: <REDACTED>
    volumes:
      - minio_data:/data
    ports:
      - target: 9000
        published: 9000
        protocol: tcp
        mode: host
      - target: 9001
        published: 9001
        protocol: tcp
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  minio_data:
