server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── HTML siempre fresco (durante pre-lanzamiento) ────────────────────────
    location ~* \.html$ {
        add_header Cache-Control "no-store, must-revalidate" always;
        expires 0;
    }

    # ── Estáticos: cache MUY corto y revalidable mientras el sitio está en flujo
    location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
        expires 60s;
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        add_header Cache-Control "no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
