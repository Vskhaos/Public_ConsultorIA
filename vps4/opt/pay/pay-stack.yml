# ─────────────────────────────────────────────────────────────────────────────
# Stack `pay` — BTCPay Server self-hosted (VPS4 standalone)
# ─────────────────────────────────────────────────────────────────────────────
# Host:    consultor-pay (192.0.2.97)
# Deploy:  docker compose -f /opt/pay/pay-stack.yml --env-file /opt/pay/.env up -d
# Storage: /var/lib/pay/{bitcoin,nbxplorer,btcpay,postgres,traefik}
# Bitcoin: pruned 15GB, throttling relajado vs versión VPS2 (host más holgado)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Traefik propio en VPS4: termina TLS y enruta pay.laconsultoria.cat ───
  pay-traefik:
    image: traefik:v2.11
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=pay_internal
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --certificatesresolvers.le.acme.email=auditor@laconsultoria.cat
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/pay/traefik:/letsencrypt
    networks: [pay_internal]
    restart: unless-stopped

  pay-postgres:
    image: btcpayserver/postgres:18.1-1
    environment:
      POSTGRES_PASSWORD: ${PAY_POSTGRES_PASSWORD}
      POSTGRES_DB: btcpayserver
    volumes:
      - /var/lib/pay/postgres:/var/lib/postgresql
    networks: [pay_internal]
    restart: unless-stopped

  bitcoind:
    image: btcpayserver/bitcoin:31.0
    environment:
      BITCOIN_NETWORK: mainnet
      BITCOIN_EXTRA_ARGS: |
        prune=15000
        txindex=0
        rpcallowip=10.10.0.0/16
        rpcbind=0.0.0.0
        whitelist=10.10.0.0/16
        dbcache=3500
        maxconnections=40
        maxmempool=300
    volumes:
      - /var/lib/pay/bitcoin:/data
    networks: [pay_internal]
    restart: unless-stopped

  nbxplorer:
    image: nicolasdorier/nbxplorer:2.6.7
    environment:
      NBXPLORER_NETWORK: mainnet
      NBXPLORER_BIND: 0.0.0.0:32838
      NBXPLORER_TRIMEVENTS: 10000
      NBXPLORER_SIGNALFILESDIR: /datadir
      NBXPLORER_CHAINS: btc
      NBXPLORER_BTCRPCURL: http://bitcoind:43782
      NBXPLORER_BTCNODEENDPOINT: bitcoind:39388
      NBXPLORER_POSTGRES: User ID=postgres;Host=pay-postgres;Port=5432;Database=nbxplorer;Password=${PAY_POSTGRES_PASSWORD}
    volumes:
      - /var/lib/pay/nbxplorer:/datadir
      - /var/lib/pay/bitcoin:/root/.bitcoin
    depends_on: [bitcoind, pay-postgres]
    networks: [pay_internal]
    restart: unless-stopped

  btcpayserver:
    image: btcpayserver/btcpayserver:2.3.9
    environment:
      BTCPAY_NETWORK: mainnet
      BTCPAY_BIND: 0.0.0.0:49392
      BTCPAY_ROOTPATH: /
      BTCPAY_HOST: pay.laconsultoria.cat
      BTCPAY_HTTPS: "false"
      BTCPAY_USEXFORWARDEDPROTO: "true"
      BTCPAY_CHAINS: btc
      BTCPAY_BTCEXPLORERURL: http://nbxplorer:32838
      BTCPAY_POSTGRES: User ID=postgres;Host=pay-postgres;Port=5432;Application Name=btcpayserver;MaxPoolSize=20;Database=btcpayserver;Password=${PAY_POSTGRES_PASSWORD}
      BTCPAY_DEBUGLOG: btcpay.log
      BTCPAY_TORRCFILE: ""
      BTCPAY_DOCKERDEPLOYMENT: "false"
      BTCPAY_NETWORK_BTCEXPLORERPOSTGRES: User ID=postgres;Host=pay-postgres;Port=5432;Application Name=nbxplorer;Database=nbxplorer;Password=${PAY_POSTGRES_PASSWORD}
    volumes:
      - /var/lib/pay/btcpay:/datadir
      - /var/lib/pay/nbxplorer:/root/.nbxplorer
    depends_on: [nbxplorer, pay-postgres]
    networks: [pay_internal]
    labels:
      - traefik.enable=true
      - traefik.docker.network=pay_internal
      - traefik.http.routers.pay.rule=Host(`pay.laconsultoria.cat`)
      - traefik.http.routers.pay.entrypoints=websecure
      - traefik.http.routers.pay.tls=true
      - traefik.http.routers.pay.tls.certresolver=le
      - traefik.http.services.pay.loadbalancer.server.port=49392
    restart: unless-stopped

networks:
  pay_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/16
