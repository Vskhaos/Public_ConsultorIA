server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    # CSP: permite FullCalendar, Google Fonts y Cloudflare Turnstile.
    # Turnstile carga JS desde challenges.cloudflare.com, inyecta iframe del
    # challenge (frame-src) y hace POST a siteverify lado-cliente (connect-src).
    # script-src estricto sin 'unsafe-inline' (protección XSS real).
    # style-src mantiene 'unsafe-inline' porque FullCalendar inyecta <style>
    # tags dinámicamente desde su JS y el HTML/JS usa `style="..."` y
    # `element.style.X = Y` extensamente (riesgo XSS por CSS es despreciable).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://challenges.cloudflare.com; img-src 'self' data:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
