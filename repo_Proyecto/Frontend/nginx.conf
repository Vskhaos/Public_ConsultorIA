server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # script-src estricto sin 'unsafe-inline' (lo importante contra XSS).
    # style-src mantiene 'unsafe-inline' porque librerías y código JS aplican
    # estilos dinámicamente (riesgo XSS vía CSS es despreciable).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://challenges.cloudflare.com; img-src 'self' data: blob:; frame-src https://challenges.cloudflare.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Archivos estáticos con caché ──────────────────────────────────────────
    location ~* \.(css|js|svg|png|jpg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
