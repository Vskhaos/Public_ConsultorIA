version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Docker Swarm Stack — Monitoring
#
#  Arquitectura:
#    Wazuh Indexer (OpenSearch) ← Wazuh Manager → agentes en host/contenedores
#    Wazuh Dashboard → Indexer
#    Zabbix Server → PostgreSQL propio
#    Zabbix Web → Zabbix Server
#
#  Redes:
#    monitoring_internal  — red interna entre servicios de monitoring
#    shared_monitoring    — red compartida con stack consultor (externa, creada en setup)
#
#  Puertos expuestos:
#    5601  — Wazuh Dashboard
#    8082  — Zabbix Web
#    1514  — Wazuh agentes (TCP)
#    1515  — Wazuh enrolamiento
#    55000 — Wazuh API REST
#    10051 — Zabbix Server (para agentes)
#
#  Para desplegar: ./setup-monitoring.sh
# ─────────────────────────────────────────────────────────────────────────────

networks:
  monitoring_internal:
    driver: overlay
    internal: true
  shared_monitoring:
    external: true   # creada por setup-monitoring.sh antes del deploy

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh_indexer_data:
  zabbix_postgres_data:

services:

  # ── Wazuh Indexer (OpenSearch) ─────────────────────────────────────────────
  wazuh_indexer:
    image: wazuh/wazuh-indexer:4.9.2
    environment:
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - bootstrap.memory_lock=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=<REDACTED>
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - /home/isard/monitoring/wazuh-indexer.yml:/usr/share/wazuh-indexer/opensearch.yml:ro
      - /home/isard/monitoring/certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer.pem:ro
      - /home/isard/monitoring/certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/certs/wazuh-indexer-key.pem:ro
      - /home/isard/monitoring/certs/root-ca.pem:/usr/share/wazuh-indexer/certs/root-ca.pem:ro
      - /home/isard/monitoring/certs/admin.pem:/usr/share/wazuh-indexer/certs/admin.pem:ro
      - /home/isard/monitoring/certs/admin-key.pem:/usr/share/wazuh-indexer/certs/admin-key.pem:ro
      - /home/isard/monitoring/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml:ro
    networks:
      - monitoring_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 10s
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200 -u admin:<REDACTED> | grep -q wazuh-cluster"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Wazuh Manager ──────────────────────────────────────────────────────────
  wazuh_manager:
    image: wazuh/wazuh-manager:4.9.2
    environment:
      - INDEXER_URL=https://wazuh_indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=<REDACTED>
      - FILEBEAT_SSL_VERIFICATION_MODE=none
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=<REDACTED>
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - /home/isard/monitoring/certs/root-ca.pem:/etc/ssl/root-ca.pem:ro
      - /home/isard/monitoring/certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - /home/isard/monitoring/certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key:ro
      - /home/isard/monitoring/ossec.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - target: 1514
        published: 1514
        protocol: tcp
        mode: host
      - target: 1515
        published: 1515
        protocol: tcp
        mode: host
      - target: 55000
        published: 55000
        protocol: tcp
        mode: host
    networks:
      - monitoring_internal
      - shared_monitoring
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 15s

  # ── Wazuh Dashboard ────────────────────────────────────────────────────────
  wazuh_dashboard:
    image: wazuh/wazuh-dashboard:4.9.2
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=<REDACTED>
      - WAZUH_API_URL=https://wazuh_manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=<REDACTED>
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=<REDACTED>
    volumes:
      - /home/isard/monitoring/certs/wazuh-dashboard.pem:/etc/wazuh-dashboard/certs/dashboard.pem:ro
      - /home/isard/monitoring/certs/wazuh-dashboard-key.pem:/etc/wazuh-dashboard/certs/dashboard-key.pem:ro
      - /home/isard/monitoring/certs/root-ca.pem:/etc/wazuh-dashboard/certs/root-ca.pem:ro
    ports:
      - target: 443
        published: 5601
        protocol: tcp
        mode: ingress
    networks:
      - monitoring_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 20s

  # ── Zabbix PostgreSQL ──────────────────────────────────────────────────────
  zabbix_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <REDACTED>
    volumes:
      - zabbix_postgres_data:/var/lib/postgresql/data
    networks:
      - monitoring_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 5s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabbix -d zabbix"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Zabbix Server ──────────────────────────────────────────────────────────
  zabbix_server:
    image: zabbix/zabbix-server-pgsql:7.0-ubuntu-latest
    environment:
      DB_SERVER_HOST: zabbix_db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <REDACTED>
      POSTGRES_DB: zabbix
      ZBX_STARTPOLLERS: 5
      ZBX_STARTPOLLERSUNREACHABLE: 2
      ZBX_STARTTRAPPERS: 5
      ZBX_STARTDISCOVERERS: 2
    ports:
      - target: 10051
        published: 10051
        protocol: tcp
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring_internal
      - shared_monitoring
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 10s

  # ── Zabbix Web ─────────────────────────────────────────────────────────────
  zabbix_web:
    image: zabbix/zabbix-web-nginx-pgsql:7.0-ubuntu-latest
    environment:
      DB_SERVER_HOST: zabbix_db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <REDACTED>
      POSTGRES_DB: zabbix
      ZBX_SERVER_HOST: zabbix_server
      PHP_TZ: Europe/Madrid
    ports:
      - target: 8080
        published: 8082
        protocol: tcp
        mode: ingress
    networks:
      - monitoring_internal
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: any
        delay: 15s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
